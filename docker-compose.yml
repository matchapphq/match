services:
  match-api:
    build:
      context: ./match-api
      dockerfile: Dockerfile
    # ports:
    #   - "8008:8008"
    expose:
        - "8008"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.match-api.rule=Host(`api2.matchapp.fr`)"
      - "traefik.http.routers.match-api.entrypoints=websecure"
      - "traefik.http.routers.match-api.tls=true"
      - "traefik.http.services.match-api.loadbalancer.server.port=8008"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - REFRESH_SECRET_KEY=${REFRESH_SECRET_KEY}
      - ACCESS_JWT_SIGN_KEY=${ACCESS_JWT_SIGN_KEY}
      - REFRESH_JWT_SIGN_KEY=${REFRESH_JWT_SIGN_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_PORT=${DATABASE_PORT}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - STRIPE_PRICE_MONTHLY=${STRIPE_PRICE_MONTHLY}
      - STRIPE_PRICE_ANNUAL=${STRIPE_PRICE_ANNUAL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - QR_SECRET=${QR_SECRET}
      - LOCATIONIQ_KEY=${LOCATIONIQ_KEY}
      - PORT=${PORT}
      - REDIS_URL=${REDIS_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_SEND_MAIL=${SMTP_SEND_MAIL}
      - SMTP_SEND_NAME=${SMTP_SEND_NAME}
      - BUG_REPORT_EMAIL=${BUG_REPORT_EMAIL}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_API_ENDPOINTS=${S3_API_ENDPOINTS}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_REGION=${S3_REGION}
      - S3_BUCKET=${S3_BUCKET}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID}
      - APPLE_CLIENT_IDS=${APPLE_CLIENT_IDS}
      - GOOGLE_CLIENT_IDS=${GOOGLE_CLIENT_IDS}
      - API_SPORTS_KEY=${API_SPORTS_KEY}
    networks:
      - match-network
      - dokploy-network
    depends_on:
        mail-worker:
            condition: service_started
        redis-match:
            condition: service_started
        portainer:
            condition: service_started
    deploy:
        mode: replicated
        replicas: 2

  mail-worker:
    build:
      context: ./match-api/services/mail-service
      dockerfile: Dockerfile
    env_file:
        - .env
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=${DATABASE_HOST}
      - DATABASE_USER=${DATABASE_USER}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME}
      - REDIS_URL=${REDIS_URL}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_SECURE=${SMTP_SECURE}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_SEND_MAIL=${SMTP_SEND_MAIL}
      - BUG_REPORT_EMAIL=${BUG_REPORT_EMAIL}
    networks:
      - match-network
      - dokploy-network
    depends_on:
        redis-match:
            condition: service_healthy

  redis-match:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --port 6380
      --appendonly yes
      --maxmemory-policy noeviction
      --maxmemory 2gb
      --tcp-keepalive 60
    ports:
      - "127.0.0.1:6380:6380"
    volumes:
      - redis_data:/data
    networks:
      - match-network
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    
  redisinsght:
    image: redis/redisinsight:latest
    ports:
        - "5540:5540"
    networks:
        - dokploy-network
    restart: unless-stopped
    environment:
         - REDISINSIGHT_REDIS__1__HOST=${REDIS_HOST}
         - REDISINSIGHT_REDIS__1__PORT=${REDIS_PORT}
         - REDISINSIGHT_REDIS__1__PASSWORD=${REDIS_PASSWORD}

  match:
    build:
      context: ./match-frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    # ports:
    #   - "3001:3001"
    environment:
      - NODE_ENV=production
    depends_on:
      match-api:
        condition: service_started
    expose:
      - "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.match.rule=Host(`dev.matchapp.fr`)"
      - "traefik.http.routers.match.entrypoints=websecure"
      - "traefik.http.routers.match.tls=true"
      - "traefik.http.services.match.loadbalancer.server.port=3001"
    networks:
      - match-network
      - dokploy-network

  portainer:
    image: portainer/portainer-ce:latest
    command: -H unix:///var/run/docker.sock
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - portainer_data:/data
    ports:
    - "9000:9000"
    restart: unless-stopped
    networks:
      - dokploy-network
    
  traefik:
    image: traefik:latest
    restart: unless-stopped
    command:
        - --api.dashboard=true
        - --providers.docker=true
        - --providers.docker.exposedbydefault=false
        - --entrypoints.web.address=:80
        - --entrypoints.websecure.address=:443

        - --certificatesresolvers.myresolver.acme.email=${LETSENCRYPT_EMAIL}
        - --certificatesresolvers.myresolver.acme.storage=/acme.json
        - --certificatesresolvers.myresolver.acme.httpchallenge=true
        - --certificatesresolvers.myresolver.acme.httpchallenge.entrypoint=web
    environment:
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./acme.json:/acme.json
    networks:
      - dokploy-network
    labels:
        # Traefik dashboard UI
        - "traefik.enable=true"
        - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.matchapp.fr`)"
        - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
        - "traefik.http.routers.traefik-dashboard.service=api@internal"
        - "traefik.http.routers.traefik-dashboard.tls=true"
        - "traefik.http.routers.traefik-dashboard.tls.certresolver=myresolver"
  
        # Frontend: dev.matchapp.fr
        - "traefik.http.routers.match.rule=Host(`dev.matchapp.fr`)"
        - "traefik.http.routers.match.entrypoints=websecure"
        - "traefik.http.routers.match.service=match"
        - "traefik.http.routers.match.tls=true"
        - "traefik.http.routers.match.tls.certresolver=myresolver"
        - "traefik.http.services.match.loadbalancer.server.port=3001"
  
        # API: apiDev.matchapp.fr
        - "traefik.http.routers.match-api.rule=Host(`api2.matchapp.fr`)"
        - "traefik.http.routers.match-api.entrypoints=websecure"
        - "traefik.http.routers.match-api.service=match-api"
        - "traefik.http.routers.match-api.tls=true"
        - "traefik.http.routers.match-api.tls.certresolver=myresolver"
        - "traefik.http.services.match-api.loadbalancer.server.port=8008"

networks:
  dokploy-network:
    # external: true
    driver: bridge
  match-network:
    driver: bridge 

volumes:
  redis_data:
  portainer_data:
